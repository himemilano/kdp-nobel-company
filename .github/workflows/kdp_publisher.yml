name: 📚 KDP Novel Publisher System

on:
  schedule:
    - cron: '0 22,5,12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モードを選択してください'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'research_only'
          - 'write_only'

permissions:
  contents: write

jobs:
  run-kdp-publishing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # Step 1: 市場リサーチ
    - name: Run Market Researcher
      if: ${{ github.event.inputs.mode == 'all' || github.event.inputs.mode == 'research_only' }}
      env:
        GEMINI_API_KEY: ${{ secrets.KDP_GEMINI_API_KEY }}
      run: python kdp_novels/agents/market_researcher.py

    # Step 2, 3, 4: プロット、執筆、SEO
    - name: Run Plot, Writer & Marketing Agents
      if: ${{ github.event.inputs.mode == 'all' || github.event.inputs.mode == 'write_only' }}
      env:
        GEMINI_API_KEY: ${{ secrets.KDP_GEMINI_API_KEY }}
      run: |
        [ -f "kdp_novels/agents/plot_designer.py" ] && python kdp_novels/agents/plot_designer.py
        [ -f "kdp_novels/agents/novel_writer.py" ] && python kdp_novels/agents/novel_writer.py
        [ -f "kdp_novels/agents/seo_marketer.py" ] && python kdp_novels/agents/seo_marketer.py

    # 🛡️ Step 5: リーガル＆Amazonポリシー自動監査（新規追加！）
    - name: Run Legal & Policy Compliance Checker
      if: ${{ github.event.inputs.mode == 'all' || github.event.inputs.mode == 'write_only' }}
      env:
        GEMINI_API_KEY: ${{ secrets.KDP_GEMINI_API_KEY }}
      run: |
        if [ -f "kdp_novels/agents/legal_compliance_checker.py" ]; then
          python kdp_novels/agents/legal_compliance_checker.py
        fi

    # 📦 成果物（監査レポートを含む全資産）を自動コミット＆プッシュ
    - name: Commit and Push Novel Assets
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add kdp_novels/workspace/ || echo "変更なし"
        git commit -m "📚 [KDP出版部門] 自動生成資産およびリーガル・コンプライアンス監査レポートを格納しました" || echo "変更なし"
        git push
