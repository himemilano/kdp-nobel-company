name: 📚 KDP Publisher Hyper-Drive Loop

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-kdp-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests crewai langchain-google-genai

    - name: Run KDP Novel Loop Agent
      env:
        # API Keyの認識漏れを防ぐため、システム上の変数名を補強
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
        API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
      run: |
        echo "=== 📚 KDP小説自律執筆ハイパードライブ 起動 ==="
        python kdp_novels/agents/kdp_loop_runner.py


