name: 📚 KDP Novel Autonomous Operation (One-Shot)

on:
  schedule:
    # 毎日 日本時間 10:50, 14:50, 17:50
    - cron: '50 1,5,8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-kdp-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai crewai langchain-google-genai pydantic

    - name: Run KDP Master System
      env:
        # Python側（main.py）と名前を完全一致させる
        GEMINI_API_KEY_KDP_NOBEL: ${{ secrets.GEMINI_API_KEY_KDP_NOBEL }}
      run: |
        # ディレクトリを移動して実行（相対パスのナレッジや章ファイルを正しく読み込ませるため）
        cd channels/kdp_novel
        python main.py

    - name: Commit and Push Progress
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "🤖 [KDP自律統括部] 本日の執筆成果を格納し、定時退勤します ($(date))" || echo "変更なし"
        git push origin main
