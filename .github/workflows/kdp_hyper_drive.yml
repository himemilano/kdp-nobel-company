name: 📚 KDP Publisher Hyper-Drive Loop

on:
  schedule:
    # 毎時0分に起動して常時コンテナを維持
    - cron: '0 * * * *'
  workflow_dispatch: # 手動即時起動ボタン

permissions:
  contents: write # 成果物の自動コミット・プッシュ権限

jobs:
  run-kdp-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # 最大約6時間のコンテナ維持限界

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 📚 小説執筆自律ループランナーの実行
    - name: Run KDP Novel Loop Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
      run: |
        echo "=== 📚 KDP小説自律執筆ハイパードライブ 起動 ==="
        python kdp_novels/agents/kdp_loop_runner.py

